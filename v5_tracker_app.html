// ── HELPERS ───────────────────────────────────────────────────────────────────
const epley=(w,r)=>r<=1?+w:+(+w*(1++r/30)).toFixed(1);
const fmtTime=(s)=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
const ls={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
};

// ── SESSION → ROWS ────────────────────────────────────────────────────────────
function sessionToRows(sess){
  const day=P[sess.dayKey];
  const ts=new Date().toISOString();
  const base=[sess.id,sess.date,sess.dayKey,day.name];
  const rows=[];
  const fill=(entry_type,block,exercise,set_num,weight,reps,ex_rpe,e1rm,m1l,m1v,m2l,m2v)=>{
    rows.push([...base,entry_type,block,exercise,set_num,
      weight??'',reps??'',ex_rpe??'',e1rm??'',
      m1l??'',m1v??'',m2l??'',m2v??'',
      sess.sessionRpe??'',sess.hrv??'',sess.rhr??'',sess.rec??'',
      sess.sessionNotes??'',ts]);
  };

  if(sess.exercises){
    sess.exercises.forEach(ex=>{
      (ex.sets||[]).forEach((s,i)=>{
        if(!s.weight&&!s.reps)return;
        const e=s.weight&&s.reps>0?epley(+s.weight,+s.reps):'';
        fill('set',ex.block,ex.name,i+1,s.weight,s.reps,ex.rpe,e,'','','','');
      });
    });
    if(sess.finisher){
      const f=sess.finisher;
      if(f.rounds||f.time||f.load)
        fill('finisher','FIN',day.finisher?.name||'Finisher',1,f.load,'','','','rounds',f.rounds||'','time_min',f.time||'');
    }
  }
  if(sess.pieces){
    sess.pieces.forEach((p,i)=>{
      if(!p.split&&!p.hr)return;
      fill('piece',`P${i+1}`,p.label,i+1,'','','','','split_500m',p.split||'','hr_bpm',p.hr||'');
    });
  }
  if(sess.dayKey==='thu'){
    fill('conditioning','',day.name,1,'','','','','duration_min',sess.duration||'','avg_hr',sess.avgHr||'');
    if(sess.pace) fill('conditioning_detail','',day.name,2,'','','','','avg_pace_500m',sess.pace||'','pace_at_140',sess.paceAt140||'');
  }
  return rows;
}

// ── SYNC ──────────────────────────────────────────────────────────────────────
async function flushQueue(url){
  if(!url||!navigator.onLine)return false;
  const queue=ls.get(SK.queue)||[];
  if(!queue.length)return true;
  try{
    await fetch(url,{method:'POST',mode:'no-cors',body:JSON.stringify({rows:queue,header:COLS})});
    ls.set(SK.queue,[]);
    return true;
  }catch{return false;}
}

// ── MAKE SESSION ──────────────────────────────────────────────────────────────
function makeSession(dayKey,lastSess){
  const day=P[dayKey];
  if(!day||day.kind==='rest')return null;
  const id=`${todayISO()}_${dayKey}_${Date.now()}`;
  const base={id,date:todayISO(),dayKey,startTime:Date.now(),
    hrv:'',rhr:'',rec:'',sessionRpe:'',sessionNotes:''};
  if(day.kind==='strength'){
    const exercises=day.exercises.map((ex,i)=>{
      const lastEx=lastSess?.exercises?.[i];
      const lastDone=lastEx?.sets?.filter(s=>s.done&&s.weight)||[];
      return{...ex,rpe:'',sets:Array.from({length:ex.sets},(_,si)=>({
        weight:lastDone[si]?.weight||lastDone.slice(-1)[0]?.weight||'',
        reps:ex.reps,done:false
      }))};
    });
    return{...base,exercises,finisher:{rounds:'',time:'',load:'',notes:''}};
  }
  if(day.kind==='z4') return{...base,pieces:day.pieces.map(p=>({...p,split:'',hr:''}))};
  if(day.kind==='z2') return{...base,duration:'',avgHr:'',pace:'',paceAt140:'',
    hrAt15:'',hrAt30:'',hrAt45:''};
  return null;
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
const c=(style)=>style;// passthrough for readability

function SyncBadge({pending,syncing,error}){
  if(syncing) return <span className="pulsing" style={{fontSize:11,color:'#94A3B8'}}>↑ syncing</span>;
  if(pending>0) return <span style={{fontSize:11,color:'#D97706',fontWeight:600}}>● {pending} pending</span>;
  if(error) return <span style={{fontSize:11,color:'#EF4444'}}>✗ sync error</span>;
  return <span style={{fontSize:11,color:'#22C55E'}}>✓ synced</span>;
}

function RestTimer({secs,onDone}){
  const [left,setLeft]=useState(secs);
  const r=useRef();
  useEffect(()=>{
    r.current=setInterval(()=>setLeft(l=>{if(l<=1){clearInterval(r.current);onDone?.();return 0;}return l-1;}),1000);
    return()=>clearInterval(r.current);
  },[]);
  const pct=left/secs;
  const cr=22,circ=2*Math.PI*cr;
  const col=left<10?'#EF4444':'#059669';
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
      <svg width={54} height={54}>
        <circle cx={27} cy={27} r={cr} fill="none" stroke="#E2E8F0" strokeWidth={3}/>
        <circle cx={27} cy={27} r={cr} fill="none" stroke={col} strokeWidth={3}
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
          strokeLinecap="round" transform="rotate(-90 27 27)"/>
        <text x={27} y={32} textAnchor="middle" fontSize={12} fontWeight={600}
          fontFamily="DM Mono,monospace" fill={col}>{fmtTime(left)}</text>
      </svg>
      <span style={{fontSize:9,color:'#94A3B8',letterSpacing:'0.05em',fontWeight:600}}>REST</span>
    </div>
  );
}

          <span style={{fontSize:10,color:'#94A3B8'}}>lb</span>
        </div>
      </div>

      {/* Reps stepper */}
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <button onClick={()=>onChange({...set,reps:Math.max(1,(+set.reps||1)-1)})}
          style={{width:32,height:32,borderRadius:8,border:'1.5px solid #E2E8F0',
            background:'#F8FAFC',fontSize:18,color:'#374151',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>−</button>
        <span className="mono" style={{width:24,textAlign:'center',fontSize:17,fontWeight:700,color:'#0F172A'}}>{set.reps}</span>
        <button onClick={()=>onChange({...set,reps:(+set.reps||0)+1})}
          style={{width:32,height:32,borderRadius:8,border:'1.5px solid #E2E8F0',
            background:'#F8FAFC',fontSize:18,color:'#374151',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>+</button>
      </div>

      {/* e1RM */}
      {set.weight&&+set.reps>0&&(
        <div style={{width:42,textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:8,color:'#94A3B8'}}>e1RM</div>
          <div className="mono" style={{fontSize:11,fontWeight:600,color:accent}}>
            {epley(+set.weight,+set.reps)}
          </div>
        </div>
      )}

      {/* Done */}
      <button onClick={()=>onChange({...set,done:!set.done})}
        className={set.done?'pop':''}
        style={{width:34,height:34,borderRadius:10,border:'none',cursor:'pointer',flexShrink:0,
          background:set.done?accent:'#F1F5F9',
          color:set.done?'#fff':'#CBD5E1',fontSize:17,

          transition:'all .15s',
          boxShadow:set.done?`0 3px 10px ${accent}44`:'none'}}>✓</button>
    </div>
  );
}

  };
  return(

        {last&&last.exercises&&(
          <div style={{background:'#fff',borderRadius:14,padding:'12px 14px',
            boxShadow:'0 2px 10px rgba(0,0,0,.05)'}}>
            <div style={{fontSize:9,fontWeight:700,color:'#94A3B8',letterSpacing:'0.07em',marginBottom:9}}>
              LAST SESSION · {new Date(last.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}

            {last.exercises.slice(0,4).map(ex=>{
              const top=(ex.sets||[]).filter(s=>s.done&&s.weight&&s.reps)

                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

      <div style={{fontSize:16,fontWeight:600,color:'#374151',marginBottom:5}}>No sessions yet</div>
      <div style={{fontSize:13,color:'#94A3B8'}}>Start logging from the Today tab</div>
    </div>
  );
  return(
    <div style={{padding:'52px 13px 110px'}}>
      <div style={{fontSize:20,fontWeight:700,color:'#0F172A',marginBottom:14}}>History</div>
      {sorted.map(sess=>{
        const day=P[sess.dayKey];
        const isSynced=syncedIds.includes(sess.id);
        const isOpen=open===sess.id;
        return(
          <div key={sess.id} style={{background:'#fff',borderRadius:14,
            boxShadow:'0 2px 10px rgba(0,0,0,.05)',marginBottom:9,overflow:'hidden'}}>
            <button onClick={()=>setOpen(isOpen?null:sess.id)}
              style={{width:'100%',padding:'13px 14px',border:'none',background:'none',
                cursor:'pointer',display:'flex',alignItems:'center',gap:10,textAlign:'left'}}>
              <div style={{width:36,height:36,borderRadius:9,background:day.pl,flexShrink:0,
                display:'flex',alignItems:'center',justifyContent:'center',
                borderLeft:`3px solid ${day.a}`}}>
                <span style={{fontSize:9,fontWeight:800,color:day.a}}>{day.short}</span>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:'#0F172A'}}>{day.name}</div>
                <div style={{fontSize:10,color:'#94A3B8'}}>
                  {new Date(sess.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
                  {sess.sessionRpe&&` · RPE ${sess.sessionRpe}`}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
                <span style={{fontSize:9,color:isSynced?'#22C55E':'#D97706',fontWeight:600}}>
                  {isSynced?'✓ synced':'● pending'}</span>
                <span style={{color:'#94A3B8',fontSize:13}}>{isOpen?'▲':'▼'}</span>
              </div>
            </button>
            {isOpen&&(
              <div style={{padding:'0 14px 12px',borderTop:'1px solid #F1F5F9'}}>
                {sess.exercises?.slice(0,5).map(ex=>{
                  const top=(ex.sets||[]).filter(s=>s.done&&s.weight&&s.reps)
                    .reduce((b,s)=>epley(+s.weight,+s.reps)>epley(+(b.weight||0),+(b.reps||1))?s:b,{});
                  return(
                    <div key={ex.id} style={{display:'flex',justifyContent:'space-between',
                      alignItems:'center',padding:'7px 0',borderBottom:'1px solid #F8FAFC'}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:600,color:'#374151'}}>{ex.name}</div>
                        {ex.sets?.filter(s=>s.done&&s.weight).length>0&&(
                          <div style={{fontSize:10,color:'#94A3B8'}}>
                            {ex.sets.filter(s=>s.done&&s.weight).map(s=>`${s.weight}×${s.reps}`).join(' · ')}
                          </div>
                        )}
                      </div>
                      {top.weight&&(
                        <div style={{textAlign:'right'}}>
                          <div style={{fontSize:8,color:'#94A3B8'}}>e1RM</div>
                          <div className="mono" style={{fontSize:13,fontWeight:700,color:day.a}}>
                            {epley(+top.weight,+top.reps)}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {sess.sessionNotes&&(
                  <div style={{marginTop:7,fontSize:11,color:'#64748B',fontStyle:'italic'}}>
                    "{sess.sessionNotes}"</div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── SETTINGS SCREEN ───────────────────────────────────────────────────────────
const APPS_SCRIPT_CODE=`function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = ss.getSheetByName("Log") || ss.getActiveSheet();
    if (sheet.getLastRow() === 0) {
      sheet.appendRow(data.header);
    }
    data.rows.forEach(function(row) { sheet.appendRow(row); });
  } catch(err) { /* silent fail */ }
  return ContentService.createTextOutput("ok");
}

function doGet(e) {
  return ContentService.createTextOutput("v5 Tracker ready");
}`;

function SettingsScreen({sheetsUrl,setSheetsUrl,syncPending,onForceSync}){
  const [url,setUrl]=useState(sheetsUrl||'');
  const [saved,setSaved]=useState(false);
  const [testing,setTesting]=useState(false);
  const [testResult,setTestResult]=useState(null);

  const save=()=>{
    ls.set(SK.url,url.trim());
    setSheetsUrl(url.trim());
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const test=async()=>{
    if(!url.trim())return;
    setTesting(true);setTestResult(null);
    try{
      await fetch(url.trim(),{method:'GET',mode:'no-cors'});
      setTestResult('ok');
    }catch{setTestResult('error');}
    setTesting(false);
  };

  return(
    <div style={{padding:'52px 16px 110px'}}>
      <div style={{fontSize:20,fontWeight:700,color:'#0F172A',marginBottom:4}}>Settings</div>
      <div style={{fontSize:13,color:'#64748B',marginBottom:20}}>
        One-time setup to connect your workout log to Google Sheets.
      </div>

      {/* Step by step */}
      <div style={{background:'#fff',borderRadius:16,padding:'16px',
        boxShadow:'0 2px 10px rgba(0,0,0,.05)',marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:'#1B2E4B',letterSpacing:'0.06em',marginBottom:12}}>
          SETUP GUIDE — ONE TIME
        </div>
        {[
          ['1','Create your Google Sheet','Go to sheets.google.com → New spreadsheet. Name it "v5 Training Log". You can rename the default sheet "Log".'],
          ['2','Open Apps Script','Inside the sheet: Extensions → Apps Script. Delete any code in the editor.'],
          ['3','Paste this code','Copy the code block below and paste it into the Apps Script editor.'],
          ['4','Save & Deploy','Click Save (disk icon). Then Deploy → New deployment → Web app. Execute as: Me. Who has access: Anyone. Click Deploy. Copy the web app URL.'],
          ['5','Authorize','Google will ask you to authorize the script. Click Review permissions → your account → Allow.'],
          ['6','Paste URL below','Paste the deployment URL into the field below and tap Save.'],
        ].map(([n,title,desc])=>(
          <div key={n} style={{display:'flex',gap:10,marginBottom:12}}>
            <div style={{width:24,height:24,borderRadius:7,background:'#1B2E4B',flexShrink:0,
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:11,fontWeight:700,color:'#fff',marginTop:1}}>{n}</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'#0F172A',marginBottom:2}}>{title}</div>
              <div style={{fontSize:11,color:'#64748B',lineHeight:1.5}}>{desc}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Code block */}
      <div style={{background:'#0F172A',borderRadius:12,padding:'12px',marginBottom:14,position:'relative'}}>
        <div style={{fontSize:9,fontWeight:700,color:'#94A3B8',letterSpacing:'0.08em',marginBottom:8}}>
          APPS SCRIPT CODE — COPY THIS
        </div>
        <pre style={{fontSize:10,color:'#86EFAC',lineHeight:1.6,overflow:'auto',
          fontFamily:'DM Mono,monospace',whiteSpace:'pre-wrap',margin:0}}>
          {APPS_SCRIPT_CODE}
        </pre>
        <button onClick={()=>{
          if(navigator.clipboard)navigator.clipboard.writeText(APPS_SCRIPT_CODE);
        }} style={{position:'absolute',top:10,right:10,padding:'4px 10px',borderRadius:6,
          border:'1px solid #334155',background:'#1E293B',color:'#94A3B8',
          fontSize:10,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
          Copy
        </button>
      </div>

      {/* URL input */}
      <div style={{background:'#fff',borderRadius:14,padding:'14px',
        boxShadow:'0 2px 10px rgba(0,0,0,.05)',marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:'#1B2E4B',letterSpacing:'0.06em',marginBottom:8}}>
          APPS SCRIPT WEB APP URL
        </div>
        <input value={url} onChange={e=>setUrl(e.target.value)}
          placeholder="https://script.google.com/macros/s/..."
          style={{width:'100%',padding:'10px 12px',borderRadius:9,
            border:'1.5px solid #E2E8F0',fontSize:12,color:'#0F172A',
            background:'#F8FAFC',marginBottom:8}}/>
        <div style={{display:'flex',gap:8}}>
          <button onClick={save}
            style={{flex:1,padding:'11px',borderRadius:10,border:'none',cursor:'pointer',
              background:saved?'#22C55E':'#1B2E4B',color:'#fff',fontSize:13,fontWeight:700,
              transition:'background .2s'}}>
            {saved?'✓ Saved':'Save URL'}
          </button>
          <button onClick={test} disabled={!url.trim()||testing}
            style={{padding:'11px 16px',borderRadius:10,border:'1.5px solid #E2E8F0',
              background:'#F8FAFC',color:'#374151',fontSize:13,fontWeight:600,cursor:'pointer'}}>
            {testing?'…':'Test'}
          </button>
        </div>
        {testResult&&(
          <div style={{marginTop:8,fontSize:12,color:testResult==='ok'?'#22C55E':'#EF4444',fontWeight:600}}>
            {testResult==='ok'?'✓ Connection looks good':'✗ Could not reach URL — check it and try again'}
          </div>
        )}
      </div>

      {syncPending>0&&(
        <button onClick={onForceSync}
          style={{width:'100%',padding:'13px',borderRadius:12,border:'none',
            background:'#D97706',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',
            boxShadow:'0 4px 14px #D9770655'}}>
          ↑ Sync {syncPending} Pending Session{syncPending>1?'s':''} Now
        </button>
      )}
    </div>
  );
}

// ── NAV BAR ───────────────────────────────────────────────────────────────────
function NavBar({screen,setScreen,hasActive,syncPending}){
  const tabs=[
    {id:'home',icon:'⌂',label:'Today'},
    {id:'session',icon:'▶',label:'Session',disabled:!hasActive},
    {id:'history',icon:'◷',label:'History'},
    {id:'settings',icon:'⚙',label:'Settings'},
  ];
  return(
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',
      width:'100%',maxWidth:430,background:'#fff',
      borderTop:'1px solid #E8ECF0',display:'flex',
      padding:'8px 0',
      paddingBottom:`calc(8px + env(safe-area-inset-bottom))`,
      boxShadow:'0 -4px 24px rgba(0,0,0,.08)',zIndex:100}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>!t.disabled&&setScreen(t.id)}
          style={{flex:1,background:'none',border:'none',cursor:t.disabled?'default':'pointer',
            display:'flex',flexDirection:'column',alignItems:'center',gap:2,
            opacity:t.disabled?.3:1,padding:'2px 0',position:'relative'}}>
          {t.id==='settings'&&syncPending>0&&(
            <div style={{position:'absolute',top:0,right:'25%',width:7,height:7,
              borderRadius:'50%',background:'#D97706'}}/>
          )}
          <span style={{fontSize:20,lineHeight:1,
            filter:screen===t.id?'none':'grayscale(1) opacity(0.5)',
            transition:'filter .15s'}}>
            {t.icon==='⌂'?'🏠':t.icon==='▶'?'▶️':t.icon==='◷'?'🕐':'⚙️'}
          </span>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.05em',
            color:screen===t.id?'#1B2E4B':'#94A3B8',transition:'color .15s'}}>
            {t.label}</span>
        </button>
      ))}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
export default function App(){
  const [screen,setScreen]=useState('home');
  const [sessions,setSessions]=useState(()=>ls.get(SK.sessions)||{});
  const [queue,setQueue]=useState(()=>ls.get(SK.queue)||[]);
  const [syncedIds,setSyncedIds]=useState(()=>ls.get(SK.synced)||[]);
  const [sheetsUrl,setSheetsUrl]=useState(()=>ls.get(SK.url)||'');
  const [activeSess,setActiveSess]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [syncError,setSyncError]=useState(false);

  const saveToStorage=(newSessions,newQueue,newSynced)=>{
    ls.set(SK.sessions,newSessions);
    ls.set(SK.queue,newQueue);
    ls.set(SK.synced,newSynced||syncedIds);
  };

  const trySync=useCallback(async(urlOverride,queueOverride)=>{
    const url=urlOverride||sheetsUrl;
    const q=queueOverride||queue;
    if(!url||!navigator.onLine||!q.length)return;
    setSyncing(true);setSyncError(false);
    try{
      await fetch(url,{method:'POST',mode:'no-cors',
        body:JSON.stringify({rows:q,header:COLS})});
      setQueue([]);ls.set(SK.queue,[]);
      setSyncError(false);
    }catch{setSyncError(true);}
    setSyncing(false);
  },[sheetsUrl,queue]);

  useEffect(()=>{
    trySync();
    const handler=()=>trySync();
    window.addEventListener('online',handler);
    return()=>window.removeEventListener('online',handler);
  },[]);

  const lastForDay=useCallback((dayKey)=>{
    const s=Object.values(sessions)
      .filter(s=>s.dayKey===dayKey)
      .sort((a,b)=>b.date.localeCompare(a.date)||b.startTime-a.startTime);
    return s[0]||null;
  },[sessions]);

  const handleStart=(dayKey)=>{
    const last=lastForDay(dayKey);
    const sess=makeSession(dayKey,last);
    if(!sess)return;
    setActiveSess(sess);
    setScreen('session');
  };

  const handleSave=async()=>{
    if(!activeSess)return;
    const finished={...activeSess,endTime:Date.now()};
    const rows=sessionToRows(finished);
    const newSessions={...sessions,[finished.id]:finished};
    const newQueue=[...queue,...rows];
    const newSynced=[...syncedIds];
    setSessions(newSessions);
    setQueue(newQueue);
    saveToStorage(newSessions,newQueue,newSynced);
    setActiveSess(null);
    setScreen('home');
    // Try to sync immediately
    const url=sheetsUrl;
    if(url&&navigator.onLine){
      setSyncing(true);setSyncError(false);
      try{
        await fetch(url,{method:'POST',mode:'no-cors',
          body:JSON.stringify({rows:newQueue,header:COLS})});
        setQueue([]);ls.set(SK.queue,[]);
        setSyncedIds(p=>{const n=[...p,finished.id];ls.set(SK.synced,n);return n;});
      }catch{setSyncError(true);}
      setSyncing(false);
    }
  };

  const activeDay=activeSess?P[activeSess.dayKey]:null;

  const renderSession=()=>{
    if(!activeSess||!activeDay)return null;
    if(activeDay.kind==='strength') return(
      <StrengthSession sess={activeSess} setSess={setActiveSess}
        lastSess={lastForDay(activeSess.dayKey)} onSave={handleSave}/>);
    if(activeDay.kind==='z4') return(
      <Z4Session sess={activeSess} setSess={setActiveSess} onSave={handleSave}/>);
    if(activeDay.kind==='z2') return(
      <Z2Session sess={activeSess} setSess={setActiveSess} onSave={handleSave}/>);
    return null;
  };

  return(
    <div style={{maxWidth:430,margin:'0 auto',minHeight:'100vh',background:'#F0F2F6',
      position:'relative',fontFamily:'DM Sans,system-ui,sans-serif'}}>
      {screen==='home'&&(
        <HomeScreen onStart={handleStart} sessions={sessions}
          syncPending={queue.length} syncError={syncError} syncBusy={syncing}
          lastForDay={lastForDay}/>
      )}
      {screen==='session'&&renderSession()}
      {screen==='history'&&<HistoryScreen sessions={sessions} syncedIds={syncedIds}/>}
      {screen==='settings'&&(
        <SettingsScreen sheetsUrl={sheetsUrl} setSheetsUrl={setSheetsUrl}
          syncPending={queue.length}
          onForceSync={()=>trySync()}/>
      )}
      <NavBar screen={screen} setScreen={setScreen}
        hasActive={!!activeSess} syncPending={queue.length}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
